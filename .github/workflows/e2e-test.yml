name: E2E Smoke Test

on:
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  local-audit:
    name: Local audit smoke test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@fa04a1451ff1842e2626ccb99004d0195b455a88 # action HEAD as of 2026-06-28
        with:
          toolchain: stable

      - name: Cache cargo registry
        uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4  # v2.9.1

      - name: Build executable (debug for speed)
        run: cargo build --locked

      - name: Run Local Audit & Validate JSON
        run: |
          set +e
          sudo ./target/debug/owlzops-mapper audit --format json > audit_result.json
          MAPPER_EXIT=$?
          set -e

          # Accept exit codes 0 (clean) and 1 (findings present) — both are valid audit results
          if [ $MAPPER_EXIT -gt 1 ]; then
            echo "❌ Mapper crashed or failed setup with exit code: $MAPPER_EXIT"
            cat audit_result.json 2>/dev/null || true
            exit $MAPPER_EXIT
          fi

          jq -e '.scan_id != null' audit_result.json > /dev/null
          jq -e '.risk_score != null' audit_result.json > /dev/null
          jq -e '.host.hostname != null' audit_result.json > /dev/null
          jq -e '.packages.installed_count != null' audit_result.json > /dev/null
          echo "✅ Lightweight E2E passed! (mapper exit code: $MAPPER_EXIT)"