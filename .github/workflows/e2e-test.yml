name: E2E Smoke Test

on:
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  local-audit:
    name: Local audit smoke test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1  # v7.0.1

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@2c7215f132e9ebf062739d9130488b56d53c060c # action HEAD as of 2026-06-28
        with:
          toolchain: stable

      - name: Cache cargo registry
        uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4  # v2.9.1

      - name: Build executable (debug for speed)
        run: cargo build --locked

      - name: Run Local Audit & Validate JSON
        run: |
          set +e
          # Removed 2>/dev/null to capture stderr logs in GitHub Actions
          sudo ./target/debug/owlzops-mapper audit --format json > audit_result.json
          MAPPER_EXIT=$?
          set -e

          # Accept exit codes 0 (clean), 1 (findings), 2 (incomplete), and 3 (compromised) as valid runs.
          # Code 3 is expected here due to false positives from Azure runner components (e.g., provjobd).
          if [ $MAPPER_EXIT -gt 3 ]; then
            echo "❌ Mapper crashed or failed setup with exit code: $MAPPER_EXIT"
            cat audit_result.json 2>/dev/null || true
            exit $MAPPER_EXIT
          fi

          jq -e '.scan_id != null' audit_result.json > /dev/null
          jq -e '.risk_score != null' audit_result.json > /dev/null
          jq -e '.host.hostname != null' audit_result.json > /dev/null
          jq -e '.packages.installed_count != null' audit_result.json > /dev/null
          echo "✅ Lightweight E2E passed! (mapper exit code: $MAPPER_EXIT)"