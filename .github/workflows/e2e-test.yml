name: E2E

on:
  pull_request:
    branches: [main, develop]

permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  e2e:
    name: End-to-End Audit
    runs-on: ubuntu-24.04
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1  # v7.0.1

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@2c7215f132e9ebf062739d9130488b56d53c060c  # action HEAD as of 2026-06-28
        with:
          toolchain: stable

      - name: Cache cargo registry
        uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4  # v2.9.1

      - name: Build (debug)
        run: cargo build --locked

      - name: Run Local Audit & Validate JSON
        run: |
          set +e
          sudo ./target/debug/owlzops-mapper audit --format json > audit_result.json
          MAPPER_EXIT=$?
          set -e

          if [ $MAPPER_EXIT -gt 3 ]; then
            echo "❌ Mapper crashed or failed setup with exit code: $MAPPER_EXIT"
            cat audit_result.json 2>/dev/null || true
            exit $MAPPER_EXIT
          fi

          # Always log IoC-related arrays when exit code is 3, so that any
          # false positive is immediately visible and triageable.
          if [ $MAPPER_EXIT -eq 3 ]; then
            echo "--- IoC-bearing arrays (exit 3) ---"
            jq '{suspicious: .security.suspicious_processes,
                 injections: .security.library_injections,
                 ghosts:     .security.ghost_pids,
                 shells:     .security.reverse_shells,
                 masking:    .security.mount_masking}' audit_result.json
          fi

          # provjobd (with optional numeric suffix) is the only known false
          # positive on the GitHub runner.  All other IoC channels must be
          # empty — any new finding on any channel breaks the build.
          UNEXPECTED=$(jq -r '
            ([.security.suspicious_processes[]?.name]
               | map(select(test("^provjobd") | not)) | length)
            + ([.security.library_injections[]?] | length)
            + ([.security.ghost_pids[]?]         | length)
            + ([.security.reverse_shells[]?]     | length)
            + ([.security.mount_masking[]?]      | length)' audit_result.json)
          if [ "$UNEXPECTED" -ne 0 ]; then
            echo "::error::$UNEXPECTED unexpected IoC finding(s) — new false positive or real regression"
            exit 1
          fi

          jq -e '.scan_id != null'                  audit_result.json > /dev/null
          jq -e '.risk_score != null'               audit_result.json > /dev/null
          jq -e '.host.hostname != null'            audit_result.json > /dev/null
          jq -e '.packages.installed_count != null' audit_result.json > /dev/null

          # Fields introduced in v0.5.23/v0.5.24 — guard against regressions
          # where a field is collected but not delivered to the consumer.
          jq -e '.security | has("provenance_source")'    audit_result.json > /dev/null
          jq -e '.security | has("setuid_files")'         audit_result.json > /dev/null
          jq -e '.security | has("file_capabilities")'    audit_result.json > /dev/null
          jq -e '.security.ebpf_inventory | has("links")' audit_result.json > /dev/null

      - name: Deep forensic run (smoke)
        run: |
          set +e
          sudo ./target/debug/owlzops-mapper audit --deep --format json > deep_result.json
          DEEP_EXIT=$?
          set -e
          [ $DEEP_EXIT -le 3 ] || { echo "❌ deep run failed: $DEEP_EXIT"; cat deep_result.json; exit $DEEP_EXIT; }
          jq -e '.scan_id != null' deep_result.json > /dev/null
          echo "✅ deep audit completed"

      - name: Interrupt semantics (SIGINT)
        run: |
          set +e
          ./target/debug/owlzops-mapper audit --deep --format json --output interrupted.json &
          PID=$!
          sleep 3
          kill -INT $PID
          wait $PID
          CODE=$?
          set -e

          [ "$CODE" -eq 130 ] || { echo "::error::expected exit 130 on SIGINT, got $CODE"; exit 1; }
          if [ -s interrupted.json ]; then
            echo "::error::interrupted run published a report — partial state must never be emitted"
            exit 1
          fi
          echo "✅ interrupt contract holds"