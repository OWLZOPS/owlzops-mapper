name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    name: Build ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-musl
            archive: owlzops-mapper-linux-x86_64.tar.gz
          - os: ubuntu-24.04-arm
            target: aarch64-unknown-linux-musl
            archive: owlzops-mapper-linux-arm64.tar.gz
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2

      - uses: dtolnay/rust-toolchain@a3c8d7e9e5f2b1a6c0d4e8f3a7b2c9d1e5f6a8b3  # stable 2024-01
        with:
          targets: ${{ matrix.target }}

      - uses: Swatinem/rust-cache@9bdad043e88c75890e36ad3bbc8d27f0090dd9d  # v2.7.7

      - name: Install musl tools
        run: sudo apt-get update && sudo apt-get install -y musl-tools

      - name: Build
        run: cargo build --release --target ${{ matrix.target }}

      - name: Package
        run: |
          cd target/${{ matrix.target }}/release
          tar czf ../../../${{ matrix.archive }} owlzops-mapper
          cd ../../..
          sha256sum ${{ matrix.archive }} > ${{ matrix.archive }}.sha256

      - uses: actions/upload-artifact@ea165f8d65b6e75b540449e92bf6d0647e5e8b7c  # v4.6.3
        with:
          name: ${{ matrix.archive }}
          path: |
            ${{ matrix.archive }}
            ${{ matrix.archive }}.sha256

  sign:
    name: Sign artifacts
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@95815c38cf2ff2164869cbab79da8d1f422bc89e  # v4.2.1
        with:
          merge-multiple: true

      - name: Import GPG key
        run: |
          echo "$GPG_PRIVATE_KEY" | gpg --batch --import
          echo "trusted-key $(gpg --list-keys --with-colons | grep '^pub' | cut -d: -f5)" >> ~/.gnupg/gpg.conf
        env:
          GPG_PRIVATE_KEY: ${{ secrets.GPG_PRIVATE_KEY }}

      - name: Sign all archives and checksums
        run: |
          for file in *.tar.gz *.sha256; do
            gpg --batch --yes --pinentry-mode loopback --passphrase "$GPG_PASSPHRASE" --detach-sign --armor "$file"
          done
        env:
          GPG_PASSPHRASE: ${{ secrets.GPG_PASSPHRASE }}

      - uses: actions/upload-artifact@ea165f8d65b6e75b540449e92bf6d0647e5e8b7c  # v4.6.3
        with:
          name: signed-artifacts
          path: |
            *.tar.gz
            *.sha256
            *.asc

  release:
    name: Create GitHub Release
    needs: sign
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2
        with:
          fetch-depth: 0

      - name: Download signed artifacts
        uses: actions/download-artifact@95815c38cf2ff2164869cbab79da8d1f422bc89e  # v4.2.1
        with:
          name: signed-artifacts

      - name: Install git-cliff
        uses: taiki-e/install-action@374e7f4b2e1b3a0d9e8c3f5a2b1d6c8e9f0a3b5d7  # v2.0.0
        with:
          tool: git-cliff

      - name: Generate changelog
        run: git-cliff --latest --strip header -o RELEASE_NOTES.md

      - name: Publish release
        uses: softprops/action-gh-release@c062b08f802e5e2a0e2f9d6c8e3f7a4b5c6d7e8f9  # v2.2.1
        with:
          body_path: RELEASE_NOTES.md
          files: |
            *.tar.gz
            *.sha256
            *.asc
          draft: false
          prerelease: ${{ contains(github.ref_name, '-beta') || contains(github.ref_name, '-rc') }}