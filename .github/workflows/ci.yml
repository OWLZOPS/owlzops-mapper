name: CI

on:
  push:
    branches: ['**']
  pull_request:
    branches: [main, develop]

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1
  CARGO_NET_RETRY: 10

jobs:
  test-native:
    name: Test on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-22.04, ubuntu-24.04]

    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@67ef31d5b988238dd797d409d6f9574278e20537 # action HEAD as of 2026-06-28
        with:
          toolchain: stable
          components: rustfmt, clippy
      - name: Cache cargo registry
        uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4  # v2.9.1
      - name: Check formatting
        run: cargo fmt --all -- --check
      - name: Clippy (warnings as errors)
        run: cargo clippy --all-targets -- -D warnings
      - name: Build
        run: cargo build --locked
      - name: Run tests
        run: cargo test --locked
      - name: Install cargo-audit
        run: cargo install cargo-audit --locked
      - name: Run security audit
        run: cargo audit --deny yanked
      - name: Cargo deny
        uses: EmbarkStudios/cargo-deny-action@bb137d7af7e4fb67e5f82a49c4fce4fad40782fe # v2.0.20

  test-containers:
    name: Test in ${{ matrix.container }}
    runs-on: ubuntu-latest
    container: ${{ matrix.container }}
    strategy:
      fail-fast: false
      matrix:
        container:
          - debian:stable
          - almalinux:8
          - almalinux:9
          - redhat/ubi8:latest
          - redhat/ubi9:latest
          - fedora:latest
          - rockylinux:8
          - rockylinux:9
          - quay.io/centos/centos:stream9
          - alpine:latest
    env:
      ACTIONS_ALLOW_USE_UNSECURE_NODE_VERSION: true
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0
      - name: Install system dependencies (build-only)
        run: |
          if command -v apt-get >/dev/null 2>&1; then
            apt-get update && apt-get install -y curl gcc make
          elif command -v dnf >/dev/null 2>&1; then
            dnf install -y --allowerasing curl gcc make || {
              dnf install -y gcc make
              dnf install -y --allowerasing curl
            }
          elif command -v microdnf >/dev/null 2>&1; then
            microdnf install -y gcc make curl
            update-ca-trust
          elif command -v yum >/dev/null 2>&1; then
            yum install -y curl gcc make
          elif command -v apk >/dev/null 2>&1; then
            apk add --no-cache curl gcc musl-dev make
          fi
      - name: Install Rust
        run: |
          curl --proto '=https' --tlsv1.2 -sSf https://sh.rustup.rs | sh -s -- -y --default-toolchain stable
          echo "$HOME/.cargo/bin" >> $GITHUB_PATH
      - name: Build
        run: cargo build --locked
      - name: Run tests
        run: cargo test --locked
  test-opensuse:
    name: Test in openSUSE Tumbleweed
    runs-on: ubuntu-latest
    env:
      ACTIONS_ALLOW_USE_UNSECURE_NODE_VERSION: true
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0
      - name: Run tests in openSUSE container
        run: |
          docker run --rm \
            -v $PWD:/src \
            -w /src \
            opensuse/tumbleweed:latest \
            bash -c "
            set -ex
            zypper --non-interactive refresh
            zypper --non-interactive install -y gcc gcc-c++ make curl glibc-devel tar gzip
            export CC=gcc
            export CXX=g++
            export RUSTFLAGS='-C linker=gcc'
            curl --proto '=https' --tlsv1.2 -sSf https://sh.rustup.rs | sh -s -- -y --default-toolchain stable
            source \$HOME/.cargo/env
            cargo build --locked
            cargo test --locked
          "