name: CI

on:
  push:
    branches: ['**']
  pull_request:
    branches: [main, develop]

permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1
  CARGO_NET_RETRY: 10

jobs:
  test-native:
    name: Test on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    env:
      CC: gcc
      CXX: g++
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-22.04, ubuntu-24.04]

    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1

      - name: Disable Clang to force GCC for aws-lc-sys
        if: matrix.os == 'ubuntu-22.04'
        run: sudo rm -rf /usr/bin/clang* /usr/local/bin/clang* /usr/lib/llvm* || true

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@2c7215f132e9ebf062739d9130488b56d53c060c # action HEAD as of 2026-06-28
        with:
          toolchain: stable
          components: rustfmt, clippy

      - name: Cache cargo registry
        uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4  # v2.9.1
        with:
          prefix-key: "v4-gcc-force"

      - name: Check formatting
        run: cargo fmt --all -- --check

      - name: Clippy (warnings as errors)
        run: cargo clippy --all-targets -- -D warnings

      - name: Run tests
        run: cargo test --locked

      # R19-16: guard panic=unwind invariant (one-shot, not matrix-duplicated)
      - name: Guard panic strategy (R19-16)
        if: matrix.os == 'ubuntu-24.04'
        run: |
          grep -qE '^\s*panic\s*=\s*"unwind"' Cargo.toml \
            || { echo "::error file=Cargo.toml::panic=\"unwind\" missing from [profile.release]"; exit 1; }
          if grep -qE 'panic\s*=\s*"abort"' Cargo.toml; then
            echo "::error file=Cargo.toml::panic=\"abort\" reintroduced — scanner isolation depends on JoinError::is_panic(); see v0.5.4 revert"
            exit 1
          fi

      - name: Cargo deny
        uses: EmbarkStudios/cargo-deny-action@3c6349835b2b7b196a839186cb8b78e02f7b5f25 # v2.1.1

  build-macos-orchestrator:
    name: Build macOS orchestrator
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1  # v7.0.1

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@2c7215f132e9ebf062739d9130488b56d53c060c  # action HEAD as of 2026-06-28
        with:
          toolchain: stable
          # clippy deferred: dead-code audit under --no-default-features → v0.5.25

      - name: Cache cargo registry
        uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4  # v2.9.1

      # R19V11-01: tests do not depend on the dead-code audit and must run now —
      # this is the only verification of the published macOS artifact beyond compilation.
      - name: Run tests (orchestrator config)
        run: cargo test --locked --no-default-features

      - name: Build orchestrator (remote-only)
        run: cargo build --release --no-default-features

  test-containers:
    name: Test in ${{ matrix.container }}
    runs-on: ubuntu-latest
    container: ${{ matrix.container }}
    strategy:
      fail-fast: false
      matrix:
        container:
          - debian:stable
          - almalinux:8
          - almalinux:9
          - redhat/ubi8:latest
          - redhat/ubi9:latest
          - fedora:latest
          - rockylinux:8
          - rockylinux:9
          - quay.io/centos/centos:stream9
          - alpine:latest
    env:
      ACTIONS_ALLOW_USE_UNSECURE_NODE_VERSION: true
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1  # v7.0.1

      - name: Install system dependencies (build-only)
        run: |
          if command -v apt-get >/dev/null 2>&1; then
            apt-get update && apt-get install -y curl gcc make
          elif command -v dnf >/dev/null 2>&1; then
            dnf install -y --allowerasing curl gcc make || {
              dnf install -y gcc make
              dnf install -y --allowerasing curl
            }
          elif command -v microdnf >/dev/null 2>&1; then
            microdnf install -y gcc make curl
            update-ca-trust
          elif command -v yum >/dev/null 2>&1; then
            yum install -y curl gcc make
          elif command -v apk >/dev/null 2>&1; then
            apk add --no-cache curl gcc musl-dev make tar gzip
          fi

      - name: Install Rust
        run: |
          curl --proto '=https' --tlsv1.2 -sSf https://sh.rustup.rs | sh -s -- -y --default-toolchain stable
          echo "$HOME/.cargo/bin" >> $GITHUB_PATH

      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4  # v2.9.1
        with:
          shared-key: ${{ matrix.container }}

      - name: Build
        run: cargo build --locked

      - name: Run tests
        run: cargo test --locked

  test-opensuse:
    name: Test in openSUSE Tumbleweed
    runs-on: ubuntu-latest
    env:
      ACTIONS_ALLOW_USE_UNSECURE_NODE_VERSION: true
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1  # v7.0.1

      - name: Run tests in openSUSE container
        run: |
          docker run --rm \
            -v $PWD:/src \
            -w /src \
            opensuse/tumbleweed:latest \
            bash -c "
            set -ex
            zypper --non-interactive refresh
            zypper --non-interactive install -y gcc gcc-c++ make curl glibc-devel tar gzip
            export CC=gcc
            export CXX=g++
            export RUSTFLAGS='-C linker=gcc'
            curl --proto '=https' --tlsv1.2 -sSf https://sh.rustup.rs | sh -s -- -y --default-toolchain stable
            source \$HOME/.cargo/env
            cargo build --locked
            cargo test --locked
          "