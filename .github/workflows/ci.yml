name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  test-native:
    name: Test on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-22.04, ubuntu-24.04]

    steps:
      - uses: actions/checkout@v4
      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      - name: Cache cargo registry
        uses: Swatinem/rust-cache@v2
      - name: Check formatting
        run: cargo fmt --all -- --check
      - name: Clippy (warnings as errors)
        run: cargo clippy --all-targets -- -D warnings
      - name: Build
        run: cargo build
      - name: Run tests
        run: cargo test
      - name: Security audit
        uses: rustsec/audit-check@v1
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

  test-containers:
    name: Test in ${{ matrix.container }}
    runs-on: ubuntu-latest
    container: ${{ matrix.container }}
    strategy:
      fail-fast: false
      matrix:
        container:
          - debian:stable
          - almalinux:8
          - almalinux:9
          - redhat/ubi8:latest
          - redhat/ubi9:latest
          - fedora:latest
          - rockylinux:8
          - rockylinux:9
          - quay.io/centos/centos:stream9   # CentOS Stream 9
    env:
      ACTIONS_ALLOW_USE_UNSECURE_NODE_VERSION: true
    steps:
      - uses: actions/checkout@v4
      - name: Install system dependencies (build-only)
        run: |
          if command -v apt-get >/dev/null 2>&1; then
            apt-get update && apt-get install -y curl gcc make
          elif command -v dnf >/dev/null 2>&1; then
            dnf install -y --allowerasing gcc make curl 2>/dev/null || dnf install -y gcc make
          elif command -v microdnf >/dev/null 2>&1; then
            microdnf install -y gcc make curl
          elif command -v yum >/dev/null 2>&1; then
            yum install -y curl gcc make
          fi
      - name: Install Rust
        run: |
          curl --proto '=https' --tlsv1.2 -sSf https://sh.rustup.rs | sh -s -- -y --default-toolchain stable
          echo "$HOME/.cargo/bin" >> $GITHUB_PATH
      - name: Build
        run: cargo build
      - name: Run tests
        run: cargo test

  test-opensuse:
    name: Test in openSUSE Leap
    runs-on: ubuntu-latest
    container:
      image: opensuse/leap:latest
      options: --entrypoint /bin/bash   # исправляет отсутствие sh
    env:
      ACTIONS_ALLOW_USE_UNSECURE_NODE_VERSION: true
    steps:
      - uses: actions/checkout@v4
      - name: Install system dependencies
        run: |
          zypper --non-interactive install gcc make curl
      - name: Install Rust
        run: |
          curl --proto '=https' --tlsv1.2 -sSf https://sh.rustup.rs | sh -s -- -y --default-toolchain stable
          echo "$HOME/.cargo/bin" >> $GITHUB_PATH
      - name: Build
        run: cargo build
      - name: Run tests
        run: cargo test