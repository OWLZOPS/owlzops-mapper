name: "CLA Assistant"

on:
  issue_comment:
    types: [created]
  pull_request_target:
    types: [opened, closed, synchronize]

permissions:
  actions: write
  contents: write
  pull-requests: write
  statuses: write

jobs:
  CLAAssistant:
    runs-on: ubuntu-latest
    # Trigger the check on PR events or when a specific signature comment is made
    if: (github.event.comment.body == 'recheck' || github.event.comment.body == 'I have read the CLA Document and I hereby sign the CLA') || github.event_name == 'pull_request_target'
    steps:
      - name: "CLA Assistant"
        uses: contributor-assistant/github-action@ca4a40a7d1004f18d9960b404b97e5f30a505a08 #v2.6.1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          path-to-signatures: '.github/signatures/cla.json'
          path-to-document: 'https://github.com/OWLZOPS/owlzops-mapper/blob/main/CLA.md'
          branch: 'cla-signatures'
          # Bots are allowed by default. Your username is intentionally omitted here for the dogfooding test.
          allowlist: 'dependabot[bot],github-actions[bot]'
          create-file-commit-message: 'chore: update CLA signatures'
          signed-commit-message: 'chore: $contributorName has signed the CLA'