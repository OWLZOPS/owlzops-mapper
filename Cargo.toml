[package]
name = "owlzops-mapper"
version = "0.1.0"
edition = "2024"
description = "Owlzops Infrastructure Discovery Agent"

[dependencies]
tokio = { version = "1.52.3", features = ["full"] }
sysinfo = "0.30.13"
bollard = "0.21.0"
serde = { version = "1.0.228", features = ["derive"] }
serde_json = "1.0.150"
chrono = "0.4.45"
uuid = { version = "1.23.3", features = ["v4"] }
comfy-table = "7.2.2"
clap = { version = "4.6.1", features = ["derive"] }
rust_xlsxwriter = "0.77.0"