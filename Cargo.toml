[package]
name = "owlzops-mapper"
version = "0.1.0"
edition = "2024"
description = "Owlzops Infrastructure Discovery Agent"

[dependencies]
tokio = { version = "1.36", features = ["full"] }
sysinfo = "0.30"
bollard = "0.16"
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"
chrono = "0.4"
uuid = { version = "1.8", features = ["v4"] }
comfy-table = "7.1"
clap = { version = "4.4", features = ["derive"] }