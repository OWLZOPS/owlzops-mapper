[advisories]
unmaintained = "transitive"
yanked = "warn"
ignore = [
    # Marvin Attack in the `rsa` crate (pulled by `russh`).
    # Acceptable risk: owlzops-mapper is a client-side CLI tool, not a server.
    # Timing side-channel attacks are practically unexploitable in this context.
    "RUSTSEC-2023-0071",
]

[licenses]
allow = [
    "MIT",
    "Apache-2.0",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "ISC",
    "Unicode-3.0",
    "MPL-2.0",
    "LicenseRef-Commons-Clause",
]

[[licenses.clarify]]
name = "owlzops-mapper"
license-files = [{ path = "LICENSE", hash = 0x892cda00 }]
expression = "LicenseRef-Commons-Clause"

[bans]
multiple-versions = "warn"